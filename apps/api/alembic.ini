# Alembic configuration for Project Rocky.
#
# The database URL is intentionally NOT set here. It is resolved at runtime in
# alembic/env.py from the application's settings module (app.core.settings), so
# there is a single source of truth for database configuration and no live
# credentials live in version control.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = %(here)s/alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Ensure the project root (apps/api) is importable so `app...` resolves.
prepend_sys_path = .

# Use os.pathsep to split version_locations if it ever contains multiple paths.
version_path_separator = os

# sqlalchemy.url is deliberately omitted — see env.py (get_url()).

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
